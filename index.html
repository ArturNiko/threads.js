<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Threads.js</title>
    <style>
        body {
            color: white;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: black;
        }

        #progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 5px;
            width: 0;
            background: #0f0;
            transition: width .2s ease-in-out;
            box-shadow: 0 0 10px #0f0;
        }

        #progress.done {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        main {
            text-align: center;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #run {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bolder;
            font-family: sans-serif;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: background .2s ease-in-out;
            box-shadow: 0 0 0 white;
        }

        #run:hover {
            background: #fff;
            color: #000;
        }

        #run.running {
            background: #fff;
            color: #000;
            pointer-events: none;
        }

        #run.done {
            color: #000;
            background: lime;
            border-color: lime;
            box-shadow: 0 0 10px lime;
            pointer-events: none;
        }
    </style>
</head>
<body>
<header>
    <div id="progress"></div>
</header>
<main>
    <h1>Threads.js</h1>
    <p>Threads.js is a library that allows you to run JavaScript in parallel.</p>
    <p>Reload the page to run again.</p>
    <button id="run">Run</button>
</main>

<script type="module">

    import Threads, {TaskPool, liveConnector} from './dist/index'

    // Define
    const threads = new Threads(8)
    const tasks1 = new TaskPool()

    // Push
    tasks1.push({method: test1, message: 10})



    document.querySelector('#run').addEventListener('click', async function () {
        this.classList.add('running')
        this.innerText = 'Running...'

        console.time('Execution took')

        // Execute
        const result1 = threads.executeParallel(tasks1, {
                step: (message, progress) => {
                    document.querySelector('#progress').style.width = (progress) + '%'
                },
                connect: (connectors) => {
                    setTimeout(() => connectors.send(1), 1000)
                    setTimeout(async () => console.log(await connectors.receive()), 2000)
                }
            }
        )

        const promises = Promise.all([result1])

        console.log('Result:', await promises)
        console.timeEnd('Execution took')

        this.classList.replace('running', 'done')
        this.innerText = 'Done'

    }, {once: true})

    async function test1(message) {
        return new Promise(_ => {
            setInterval(() => {
                // Change the message if connector value is updated
                message = liveConnector.receive() ?? message
                // Modify the value of the live connector
                liveConnector.modify(++message)
                // Console out the value
                console.log(message)
            }, 200)
        })
    }



    window.threads = threads
</script>
</body>
</html>
